name: CI, Publish & Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install semantic release
        run: pip install python-semantic-release

      - name: Bump version and create tag
        id: semrel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          semantic-release version --no-vcs-release
          echo "new_version=$(semantic-release version --print 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        if: steps.semrel.outputs.new_version != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare HF Spaces deploy (inject metadata, drop binaries)
        run: |
          HF_META=$(cat <<'EOF'
          ---
          title: PyTeslaCoil
          emoji: ⚡
          colorFrom: yellow
          colorTo: yellow
          sdk: docker
          pinned: false
          ---

          EOF
          )
          echo "$HF_META" | cat - README.md > README.tmp && mv README.tmp README.md

          # HF Spaces' pre-receive hook rejects binary blobs anywhere in the
          # incoming pack, so we squash to a single orphan commit with the
          # offending file removed.
          rm -f docs/pyTesla-coil_header.png

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout --orphan hf-deploy
          git add -A
          git commit -m "ci: Deploy to HF Spaces"

      - name: Push to Hugging Face Spaces
        run: |
          git remote add hf https://user:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Richie-rk/pyteslacoil
          git push hf hf-deploy:main --force
